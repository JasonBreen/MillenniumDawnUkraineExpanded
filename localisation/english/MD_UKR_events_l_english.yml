l_english:
 ukr_expanded.1.t: "Independence Referendum, 1991"
 ukr_expanded.1.d: "Ukraine's nationwide referendum confirms overwhelming support for independence, consolidating the mandate for sovereign statehood."
 ukr_expanded.1.a: "A new state is born."

 ukr_expanded.2.t: "The Budapest Memorandum"
 ukr_expanded.2.d: "Kyiv accepts security assurances in exchange for nuclear disarmament, marking a major shift in Ukraine's strategic posture."
 ukr_expanded.2.a: "We place trust in guarantees."

 ukr_expanded.3.t: "The Orange Revolution"
 ukr_expanded.3.d: "Mass demonstrations challenge the legitimacy of election results, forcing a political reckoning in favor of public mobilization."
 ukr_expanded.3.a: "The streets demand accountability."

 ukr_expanded.4.t: "Euromaidan Protests"
 ukr_expanded.4.d: "Protests gather momentum in Kyiv as citizens call for a European course and reject political backtracking."
 ukr_expanded.4.a: "The square becomes the nation's voice."

 ukr_expanded.20.t: "Kuchma's Second Term"
 ukr_expanded.20.d: "Ukraine enters the new millennium under President Leonid Kuchma, balancing oligarchic interests, presidential authority, and competing foreign-policy pressures."
 ukr_expanded.20.a: "The system holds—for now."

 ukr_expanded.21.t: "The Cassette Scandal"
 ukr_expanded.21.d: "Recordings connected to the disappearance and murder of journalist Georgiy Gongadze damage the presidency and deepen public distrust."
 ukr_expanded.21.a: "The opposition finds its voice."

 ukr_expanded.22.t: "Oligarchic Media Networks"
 ukr_expanded.22.d: "Business factions and media empires shape public life, turning political competition into a struggle between regional machines and private interests."
 ukr_expanded.22.a: "Power speaks through television."

 ukr_expanded.23.t: "The 2004 Presidential Election"
 ukr_expanded.23.d: "A bitter campaign between Viktor Yanukovych and Viktor Yushchenko becomes a test of whether elections can still command legitimacy."
 ukr_expanded.23.a: "The result will not settle the question."

 ukr_expanded.24.t: "Yushchenko Poisoned"
 ukr_expanded.24.d: "Viktor Yushchenko survives a poisoning attempt during the campaign, transforming him into a symbol of the opposition's struggle."
 ukr_expanded.24.a: "The campaign darkens."

 ukr_expanded.25.t: "The Orange Revolution"
 ukr_expanded.25.d: "Mass demonstrations fill Kyiv after a disputed election, forcing Ukraine's political system into a moment of national reckoning."
 ukr_expanded.25.a: "The square answers."
